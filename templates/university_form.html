{% extends "base.html" %}

{% block title %}Add university — ZochAI-CRM{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold text-gray-900 mb-6">Add university</h1>

<div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5 max-w-2xl">
    <form method="post" class="space-y-4">
        <div>
            <label class="block text-xs font-medium text-gray-500 mb-1">Name *</label>
            <input type="text" name="name" required
                   class="w-full border border-gray-200 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1">Partnership type</label>
                <select name="partnership_type" class="w-full border border-gray-200 rounded-md px-3 py-2 text-sm">
                    {% for pt in partnership_types %}
                    <option value="{{ pt }}">{{ pt }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1">Status</label>
                <select name="status" class="w-full border border-gray-200 rounded-md px-3 py-2 text-sm">
                    {% for st in university_statuses %}
                    <option value="{{ st }}">{{ st }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div>
            <label class="block text-xs font-medium text-gray-500 mb-1">Partner / agency (optional)</label>
            <input type="text" name="partner_agency_name"
                   class="w-full border border-gray-200 rounded-md px-3 py-2 text-sm">
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1">Contact person</label>
                <input type="text" name="contact_person"
                       class="w-full border border-gray-200 rounded-md px-3 py-2 text-sm">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1">Contact email</label>
                <input type="email" name="contact_email"
                       class="w-full border border-gray-200 rounded-md px-3 py-2 text-sm">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1">Contact phone</label>
                <input type="text" name="contact_phone"
                       class="w-full border border-gray-200 rounded-md px-3 py-2 text-sm">
            </div>
        </div>
        <div>
            <label class="block text-xs font-medium text-gray-500 mb-1">Application portal URL</label>
            <input type="url" name="application_portal_url"
                   class="w-full border border-gray-200 rounded-md px-3 py-2 text-sm">
        </div>
        <div>
            <label class="block text-xs font-medium text-gray-500 mb-1">Internal notes</label>
            <textarea name="internal_notes" rows="3"
                      class="w-full border border-gray-200 rounded-md px-3 py-2 text-sm"></textarea>
        </div>
        <div class="flex gap-2">
            <button type="submit" class="bg-[#3b82f6] text-white text-sm font-medium rounded-md px-4 py-2 hover:bg-blue-600">Save</button>
            <a href="{{ url_for('universities.list_view') }}" class="text-sm font-medium text-gray-600 border border-gray-200 rounded-md px-4 py-2 hover:bg-gray-50">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
