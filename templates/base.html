<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}SmartEd CRM{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="bg-[#fafafa] text-gray-800 min-h-screen flex">

    <div class="w-64 bg-[#0b2228] text-gray-300 flex flex-col justify-between p-4 min-h-screen">
        <div>
            <div class="flex items-center space-x-2 px-2 py-3 mb-6">
                <div class="bg-[#10b981] text-white font-bold rounded p-1.5 text-sm w-8 h-8 flex items-center justify-center">S</div>
                <span class="text-white font-semibold text-lg">SmartEd <span class="text-[#10b981] text-xs font-mono">CRM</span></span>
            </div>

            <div class="space-y-6">
                <div>
                    <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider px-2 mb-2">Main</p>
                    <a href="{{ url_for('dashboard') }}" class="flex items-center space-x-2 px-3 py-2 bg-[#10b981] text-white rounded-md text-sm font-medium">
                        <span>Dashboard</span>
                    </a>
                    <a href="#" class="flex items-center space-x-2 px-3 py-2 text-gray-400 hover:text-white rounded-md text-sm font-medium mt-1">
                        <span>Students</span>
                    </a>
                </div>
                <div>
                    <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider px-2 mb-2">Shared</p>
                    <a href="#" class="flex items-center space-x-2 px-3 py-2 text-gray-400 hover:text-white rounded-md text-sm font-medium">
                        <span>Updates</span>
                    </a>
                    <a href="#" class="flex items-center space-x-2 px-3 py-2 text-gray-400 hover:text-white rounded-md text-sm font-medium mt-1">
                        <span>Resources</span>
                    </a>
                </div>
            </div>
        </div>
        <div class="border-t border-gray-800 pt-4 text-xs text-gray-500 text-center">
            SmartEd v1.0.0 (Prototype)
        </div>
    </div>

    <div class="flex-1 flex flex-col">

        <div class="bg-white border-b border-gray-100 px-8 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 rounded-full bg-emerald-50 text-emerald-700 font-bold flex items-center justify-center text-sm border border-emerald-200">
                    {{ user.display_name[0]|upper }}
                </div>
                <div>
                    <span class="font-semibold text-gray-900 block leading-tight">{{ user.display_name }}</span>
                    <span class="text-xs text-gray-400 font-medium bg-gray-50 px-1.5 py-0.5 rounded border border-gray-200">
                        {{ "System Administrator" if user.role == "admin" else "Recruitment Partner" }}
                    </span>
                </div>
            </div>
            <form action="{{ url_for('logout') }}" method="post">
                <button type="submit" class="text-sm font-medium text-gray-600 border border-gray-200 rounded-md px-4 py-1.5 hover:bg-gray-50">Sign out</button>
            </form>
        </div>

        <div class="p-8 max-w-6xl w-full">
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
