{% extends "base.html" %}

{% block title %}Add student — ZochAI-CRM{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold text-gray-900 mb-6">Add student</h1>

<div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5 max-w-2xl">
    <form method="post" class="space-y-4">
        <div>
            <label class="block text-xs font-medium text-gray-500 mb-1">Full name *</label>
            <input type="text" name="full_name" required
                   class="w-full border border-gray-200 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1">Phone</label>
                <input type="text" name="phone"
                       class="w-full border border-gray-200 rounded-md px-3 py-2 text-sm">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1">Email</label>
                <input type="email" name="email"
                       class="w-full border border-gray-200 rounded-md px-3 py-2 text-sm">
            </div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1">Date of birth</label>
                <input type="date" name="date_of_birth"
                       class="w-full border border-gray-200 rounded-md px-3 py-2 text-sm">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1">Nationality</label>
                <input type="text" name="nationality"
                       class="w-full border border-gray-200 rounded-md px-3 py-2 text-sm">
            </div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1">Address</label>
                <input type="text" name="address"
                       class="w-full border border-gray-200 rounded-md px-3 py-2 text-sm">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1">Postcode</label>
                <input type="text" name="postcode"
                       class="w-full border border-gray-200 rounded-md px-3 py-2 text-sm">
            </div>
        </div>
        {% if user.role == "admin" %}
        <div>
            <label class="block text-xs font-medium text-gray-500 mb-1">Consultant</label>
            <select name="consultant_id" class="w-full border border-gray-200 rounded-md px-3 py-2 text-sm">
                {% for c in consultants %}
                <option value="{{ c.id }}">{{ c.display_name }}</option>
                {% endfor %}
            </select>
        </div>
        {% endif %}
        <div class="flex gap-2">
            <button type="submit" class="bg-[#3b82f6] text-white text-sm font-medium rounded-md px-4 py-2 hover:bg-blue-600">Save</button>
            <a href="{{ url_for('students.list_view') }}" class="text-sm font-medium text-gray-600 border border-gray-200 rounded-md px-4 py-2 hover:bg-gray-50">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
